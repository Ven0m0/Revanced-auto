[settings]
# gix = true
experimental = true
color = true
yes = true
auto_install = true
lockfile = true

[settings.python]
uv_venv_auto = "create|source"
uv_venv_create_args = ["--seed", "--system-site-packages"]

[settings.cargo]
binstall = true

[settings.pipx]
uvx = true

[settings.npm]
bun = true

[tools]
python = "3.14"
uv = "latest"
java = "temurin-25.0.3+9.0.LTS"
actionlint = "latest"
action-validator = "latest"
ruff = "latest"
ty = "latest"
prek = "latest"
"pipx:pytest" = "latest"
"pipx:basedpyright" = "latest"

[env]
_.file = { path = ".env", tools = true }
_.path = ["{{config_root}}/node_modules/.bin"]
_.python.venv = ".venv"
NODE_ENV = "{{ env.NODE_ENV | default(value='production') }}"
MISE_NPM_PACKAGE_MANAGER = "bun"
PYTHONOPTIMIZE = "1"
