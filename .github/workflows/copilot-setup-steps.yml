name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
permissions:
  contents: read
env:
  DEBIAN_FRONTEND: noninteractive
  DEBCONF_NOWARNINGS: yes
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install mise tools
        uses: jdx/mise-action@v4.0.1
        with:
          version: latest
          install: true
          experimental: true
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
      - name: Install Android SDK Build Tools
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> "${GITHUB_PATH}"
      - name: Install apt packages
        run: |
          sudo apt-get update -qq >/dev/null 2>&1
          sudo apt-get install -yqq --no-install-recommends build-essential curl fd-find jq pkg-config ripgrep shellcheck shfmt zip
      - name: Install Python dependencies
        run: uv sync --locked --all-groups
      - name: Install Copilot helper tools
        run: |
          uv tool install basedpyright
          uv tool install ruff
          uv tool install tombi
          uv tool install ty
          npm i -g \
            @ast-grep/cli \
            @biomejs/biome \
            bash-language-server \
            @zed-industries/vscode-langservers-extracted \
            yaml-language-server
      - name: Bootstrap pinned bin JAR dependencies
        run: |
          source utils.sh
          check_binaries || {
            echo "Failed to bootstrap pinned bin/*.jar dependencies" >&2
            exit 1
          }
