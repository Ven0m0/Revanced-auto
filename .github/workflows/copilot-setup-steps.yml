name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
permissions:
  contents: read
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
      - name: Install Android SDK Build Tools
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> "${GITHUB_PATH}"
      - name: Install repository toolchain
        uses: jdx/mise-action@v4.0.1
        with:
          version: 2024.12.14
          install: true
          cache: true
          experimental: true
      - name: Install Python dependencies
        run: uv sync --locked --all-groups
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
      - name: Install Copilot helper tools
        run: |
          uv tool install basedpyright
          uv tool install ruff
          uv tool install tombi
          uv tool install ty
          uv tool install yamllint
          npm install --global \
            @ast-grep/cli \
            @biomejs/biome \
            bash-language-server \
            vscode-langservers-extracted \
            yaml-language-server
      - name: Bootstrap pinned bin JAR dependencies
        run: |
          source utils.sh
          check_binaries || {
            echo "Failed to bootstrap pinned bin/*.jar dependencies" >&2
            exit 1
          }
